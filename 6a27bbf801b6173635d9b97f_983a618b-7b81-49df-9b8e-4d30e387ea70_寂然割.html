		/* ====== oneNav-style carousel ====== */
		.slideimg {
			position: relative;
			max-width: 100%;
			overflow: hidden;
		}

		.carousel {
			position: relative;
			width: 100%;
			max-width: 1500px;
			height: auto;
			/* Use a dynamic ratio when JS sets --carousel-aspect; fallback keeps old behavior */
			aspect-ratio: var(--carousel-aspect, 1500 / 720);
			overflow: hidden;
			border-radius: 18px;
		}

		.slide {
			position: absolute;
			width: 100%;
			height: 100%;
			transition: opacity 0.5s ease-in-out;
		}

		.slide img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.dots {
			display: flex;
			justify-content: center;
			position: absolute;
			bottom: 10px;
			width: 100%;
			z-index: 10;
		}

		.dot {
			width: 10px;
			height: 10px;
			margin: 0 5px;
			background-color: #fff;
			border-radius: 50%;
			cursor: pointer;
			opacity: .85;
		}

		.dot.active {
			background-color: #333;
			opacity: 1;
		}

		@media (max-width: 768px) {
			.carousel {
				border-radius: 14px;
			}
		}

		/* bottom random advertise */
		.bottom-ad {
			margin: 0.8rem 0rem;

		.bottom-carousel .bottom-ad-item {

			display: none;
		}

		.bottom-carousel .bottom-ad-item img {

			height: 100%;
			object-fit: cover;
			display: block;
		}

	<script>
		// ====== 工具 JS 代码（Ty 核心逻辑） ======
		(() => {
			function Ty() {}
			Ty.prototype.get = (dom, isAll = false) => {
				if (isAll) {
					return document.querySelectorAll(dom);
				} else {
					return document.querySelector(dom);
				}
			};

			Ty.prototype.ErgNode = (nodes, callback) => {
				const allNode = document.querySelectorAll(nodes);
				for (let index = 0; index < allNode.length; index++) {
					callback(allNode[index], index);
				}
			};

			Ty.prototype.$Tab = (options) => {
				const { tabs, active, box } = options;
				const tab = tabs.split(".")[1];
				const boxs = $.get(box, true);
				let pre = null,
					pre_box = null;

				$.ErgNode(tabs, (item, index) => {
					if (index == 0) {
						pre = item;
						pre_box = boxs[index];
						item.className = `${tab} ${active}`;
						boxs[index].style.display = "block";
					}
					item.onclick = function () {
						pre.className = tab;
						pre_box.style.display = "none";
						this.className = `${tab}  ${active}`;
						boxs[index].style.display = "block";
						pre = this;
						pre_box = boxs[index];
					};
				});
			};

			Ty.prototype.$Ren = (options) => {
				const { fat, data, call } = options;
				let temp = "";
				const fat_1 = $.get(fat);

				data.forEach((item) => {
					temp += call(item);
				});

				fat_1.innerHTML = temp;
			};

			window.$ = new Ty();
		})();

		// ====== 业务 JS 代码（页面原始控制逻辑） ======
		(function () {
			const popup = document.querySelector('.popup-LYADCC');
			const menu = document.querySelector('#menu');
			const gap = 2;

			let open = false;

			function positionPopup() {
				if (!popup || !menu) return;
				const rect = menu.getBoundingClientRect();
				popup.style.position = 'fixed';
				popup.style.top = `${Math.round(rect.bottom + gap)}px`;
				popup.style.left = `${Math.round(rect.right - gap)}px`;
				popup.style.transform = 'translateX(-100%)';
				popup.style.maxWidth = 'calc(100vw - 8px)';

				// Clamp to viewport if needed
				const pr = popup.getBoundingClientRect();
				const vw = window.innerWidth || document.documentElement.clientWidth || 0;
				if (pr.left < 4) {
					popup.style.left = '4px';
					popup.style.transform = 'none';
				} else if (pr.right > vw - 4) {
					popup.style.left = `${vw - 4}px`;
					popup.style.transform = 'translateX(-100%)';
				}
			}

			function openPopup() {
				if (!popup || !menu) return;
				popup.style.display = 'flex';
				popup.style.visibility = 'hidden';
				positionPopup();
				popup.style.visibility = 'visible';
				open = true;
				window.addEventListener('resize', positionPopup);
				window.addEventListener('scroll', positionPopup, true);
			}

			function closePopup() {
				if (!popup) return;
				popup.style.display = 'none';
				open = false;
				window.removeEventListener('resize', positionPopup);
				window.removeEventListener('scroll', positionPopup, true);
			}

			if (popup && menu) {
				menu.addEventListener('click', function () {
					if (open) closePopup();
					else openPopup();
				});
			}

			const links = document.querySelectorAll('.popup-LYADCC .contact-link');
			const isValidHttpUrl = (value) => {
				if (!value) return false;
				try {
					const u = new URL(value);
					return u.protocol === 'http:' || u.protocol === 'https:';
				} catch (e) {
					return false;
				}
			};

			links.forEach((a) => {
				a.addEventListener('click', (e) => {
					const url = a.getAttribute('data-url') || '';
					if (!isValidHttpUrl(url)) {
						e.preventDefault();
						return;
					}
					e.preventDefault();
					window.open(url, '_blank', 'noopener,noreferrer');
				});
			});

			const bottomAd = document.querySelector('#bottomAd');
			if (bottomAd) {
				const items = bottomAd.querySelectorAll('.bottom-ad-item');
				if (items && items.length > 0) {
					const idx = Math.floor(Math.random() * items.length);
					const item = items[idx];
					item.style.display = 'block';

					item.addEventListener('click', (e) => {
						const url = item.getAttribute('data-url') || '';
						if (!isValidHttpUrl(url)) {
							e.preventDefault();
							return;
						}
						e.preventDefault();
						window.open(url, '_blank', 'noopener,noreferrer');
					});
				}
			}
		})();

		// oneNav-style carousel
		(function () {
			let currentIndex = 0;
			const carousel = document.querySelector('#carousel');
			const slides = document.querySelectorAll('#carousel .slide');
			const dots = document.querySelectorAll('#dots .dot');
			const intervalTime = 3000;

			if (!slides || slides.length === 0) return;

			// Keep the slideshow container's aspect-ratio consistent with the actual ad images
			(function syncCarouselAspectRatio() {
				if (!carousel) return;
				const firstImg = carousel.querySelector('img');
				if (!firstImg) return;

				const apply = () => {
					const w = firstImg.naturalWidth;
					const h = firstImg.naturalHeight;
					if (!w || !h) return;
					const ratio = `${w} / ${h}`;
					document.documentElement.style.setProperty('--carousel-aspect', ratio);
					carousel.style.setProperty('--carousel-aspect', ratio);
				};

				if (firstImg.complete) apply();
				else firstImg.addEventListener('load', apply, { once: true });
			})();

			function showSlide(index) {
				slides.forEach((slide, i) => {
					slide.style.opacity = i === index ? 1 : 0;
					slide.style.zIndex = i === index ? 1 : 0;
				});
				dots.forEach((dot, i) => {
					dot.classList.toggle('active', i === index);
				});
			}

			function nextSlide() {
				currentIndex = (currentIndex + 1) % slides.length;
				showSlide(currentIndex);
			}

			showSlide(0);
			if (slides.length <= 1) return;

			let timer = setInterval(nextSlide, intervalTime);
			function restartTimer() {
				clearInterval(timer);
				timer = setInterval(nextSlide, intervalTime);
			}

			// dot click
			dots.forEach((dot, i) => {
				dot.addEventListener('click', () => {
					currentIndex = i;
					showSlide(currentIndex);
					restartTimer();
				});
			});

			// touch swipe
			let startX = 0;
			let endX = 0;
			if (!carousel) return;

			carousel.addEventListener('touchstart', (e) => {
				startX = e.touches[0].clientX;
			}, { passive: true });

			carousel.addEventListener('touchmove', (e) => {
				endX = e.touches[0].clientX;
			}, { passive: true });

			carousel.addEventListener('touchend', () => {
				if (startX - endX > 50) {
					nextSlide();
				} else if (endX - startX > 50) {
					currentIndex = (currentIndex - 1 + slides.length) % slides.length;
					showSlide(currentIndex);
				}
				restartTimer();
			});
		})();
	</script>
